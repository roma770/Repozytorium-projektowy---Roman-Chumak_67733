<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roman Chumak - Zadanie 6 (67733)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-green">
    <header>
        <h1>Roman Chumak - CV</h1>
        <p>Numer indeksu: <strong>67733</strong></p>
        <button id="themeToggleBtn">Zmień motyw na czerwony</button>
    </header>

    <main>
        <section id="doswiadczenie" class="cv-section">
            <h2>
                Doświadczenie 
                <button id="toggleSectionBtn">Ukryj sekcję</button>
            </h2>
            <div id="sectionContent">
                <ul id="doswiadczenie-list"></ul>
            </div>
        </section>

        <section id="umiejetnosci" class="cv-section">
            <h2>Umiejętności</h2>
            <ul id="umiejetnosci-list"></ul>
        </section>

        <section id="kontakt" class="cv-section">
            <h2>Kontakt </h2>
            <form id="contactForm" novalidate>
                <div class="form-group">
                    <label for="imie">Imię:</label>
                    <input type="text" id="imie" name="imie" placeholder="Wpisz swoje imię">
                    <div class="error-msg" id="error-imie"></div>
                </div>
                
                <div class="form-group">
                    <label for="nazwisko">Nazwisko:</label>
                    <input type="text" id="nazwisko" name="nazwisko" placeholder="Wpisz swoje nazwisko">
                    <div class="error-msg" id="error-nazwisko"></div>
                </div>

                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" placeholder="Wpisz swój e-mail">
                    <div class="error-msg" id="error-email"></div>
                </div>

                <div class="form-group">
                    <label for="wiadomosc">Wiadomość:</label>
                    <textarea id="wiadomosc" name="wiadomosc" rows="4" placeholder="Wpisz wiadomość..."></textarea>
                    <div class="error-msg" id="error-wiadomosc"></div>
                </div>

                <button type="submit">Wyślij formularz</button>
            </form>
            <div id="form-success" class="success-msg">Formularz został pomyślnie zwalidowany!</div>
        </section>
    </main>

    <script src="scripy.js"></script> 
</body>
</html>
