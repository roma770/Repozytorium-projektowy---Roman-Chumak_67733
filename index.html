<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roman Chumak 67733 - CV PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-green">
    <div class="container">
        <header>
            <h1>Roman Chumak</h1>
            <p class="subtitle">Numer indeksu: <strong>67733</strong></p>
            <button id="themeToggleBtn" class="btn-main"> Zmień motyw</button>
        </header>

        <main>
            <section id="doswiadczenie" class="cv-card">
                <div class="card-header">
                    <h2> Doświadczenie</h2>
                    <button id="toggleSectionBtn" class="btn-small">Ukryj</button>
                </div>
                <ul id="doswiadczenie-list" class="dynamic-list"></ul>
            </section>

            <section id="umiejetnosci" class="cv-card">
                <h2> Umiejętności</h2>
                <ul id="umiejetnosci-list" class="dynamic-list"></ul>
            </section>

            <section id="notatki" class="cv-card">
                <h2> Moje Notatki (LocalStorage)</h2>
                <div class="input-group">
                    <input type="text" id="noteInput" placeholder="Nowa notatka...">
                    <button id="addNoteBtn" class="btn-small">Dodaj</button>
                </div>
                <ul id="notes-list" class="dynamic-list"></ul>
            </section>

            <section id="kontakt" class="cv-card">
                <h2>Kontakt (Backend POST)</h2>
                <form id="contactForm" novalidate>
                    <div class="form-row">
                        <div class="form-group">
                            <input type="text" id="imie" placeholder="Imię">
                            <span id="error-imie" class="error-msg"></span>
                        </div>
                        <div class="form-group">
                            <input type="text" id="nazwisko" placeholder="Nazwisko">
                            <span id="error-nazwisko" class="error-msg"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <input type="email" id="email" placeholder="Email">
                        <span id="error-email" class="error-msg"></span>
                    </div>

                    <div class="form-group">
                        <textarea id="wiadomosc" placeholder="Wiadomość" rows="4"></textarea>
                        <span id="error-wiadomosc" class="error-msg"></span>
                    </div>

                    <button type="submit" id="submitBtn" class="btn-submit">Wyślij na serwer</button>
                </form>
                <div id="form-success" class="success-banner"></div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
